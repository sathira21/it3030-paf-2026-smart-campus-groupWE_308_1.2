spring.application.name=Backend
spring.config.import=optional:file:./secrets.properties

# Server Configuration
server.port=8081

# Database Configuration (SQL Server - SQL Authentication)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=smart_campus_db;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=SmartCampus@2024

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
app.jwt.secret=smartcampus-super-secret-jwt-key-2024-do-not-share
app.jwt.expiration-in-ms=86400000

# File Upload Configuration
file.upload-dir=./uploads
image.upload.directory=uploads/feedback-images
image.base.url=http://localhost:8081/api
app.base.url=http://localhost:8081

# OAuth2 Redirect URI
app.oauth2.authorized-redirect-uris=http://localhost:3000/auth-success

# CORS
cors.allowed.origins=http://localhost:3000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sathiraudan21@gmail.com
spring.mail.password=${spring.mail.password:default_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=365297517562-ptecv2inrc0nm908lubloqiur6rmmd5u.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${spring.security.oauth2.client.registration.google.client-secret:default_secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Explicit Provider Configuration (Crucial for newer Spring versions)
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Logging
logging.level.com.sliit.smartcampus=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Base URL Resolution fix for OAuth2
server.forward-headers-strategy=native