<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus — Resource Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; overflow-x: hidden; }
        .bg-dots { background-color: transparent; background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px); background-size: 24px 24px; }
        .premium-card { background: #ffffff; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); transition: all 0.3s ease; }
        .search-pill { background: white; border-radius: 999px; border: 1px solid #e2e8f0; padding: 4px; display: flex; align-items: center; width: 100%; max-width: 500px; }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-body { background: white; border-radius: 32px; width: 95%; max-width: 600px; padding: 40px; transform: scale(0.9); transition: all 0.3s ease; max-height: 90vh; overflow-y: auto; }
        .modal.show .modal-body { transform: scale(1); }
    </style>
</head>
<body class="bg-dots">
    <header class="px-8 py-4 flex items-center justify-between bg-white border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-black text-slate-900 leading-none">Resource Manager</h1>
                <p class="text-[11px] font-bold text-slate-400 mt-1 uppercase tracking-wider">Campus Facilities & Assets</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <a href="admin-bookings.html" class="text-xs font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest">Manage Bookings</a>
            <div class="w-px h-6 bg-slate-200"></div>
            <button onclick="localStorage.removeItem('jwt_token'); window.location.href='/index.html';" class="text-xs font-black text-rose-500 hover:text-rose-600 uppercase tracking-widest">Logout</button>
            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center">
                <svg class="w-4 h-4 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-10">
        <!-- Stats Grid -->
        <div class="grid grid-cols-4 gap-6 mb-12">
            <div class="premium-card p-6 flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <div>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Total Resources</p>
                    <h3 class="text-2xl font-black text-slate-900" id="stat-total">0</h3>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="flex items-center justify-between gap-4 mb-8">
            <div class="search-pill">
                <div class="flex items-center px-4">
                    <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="text" id="search-input" oninput="render()" placeholder="Search resources by name or location..." class="flex-1 bg-transparent py-3 outline-none text-sm text-slate-600 font-medium">
            </div>
            <div class="flex items-center gap-4">
                <select id="type-filter" onchange="render()" class="px-5 py-3 rounded-2xl border border-slate-200 outline-none text-sm font-bold bg-white focus:border-blue-500">
                    <option value="ALL">All Resource Types</option>
                    <option value="LECTURE_HALL">Lecture Halls</option>
                    <option value="LAB">Labs</option>
                    <option value="MEETING_ROOM">Meeting Rooms</option>
                </select>
                <button onclick="openResourceModal()" class="px-7 py-3 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 4v16m8-8H4"/></svg> Add New Resource
                </button>
            </div>
        </div>

        <!-- Resource Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="resource-list">
            <!-- Resources Load Here -->
        </div>
    </main>

    <!-- Resource Modal -->
    <div id="resource-modal" class="modal">
        <div class="modal-body !max-w-[700px]">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600/10 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-slate-900 leading-none" id="modal-title">Create New Resource</h2>
                        <p class="text-[11px] font-bold text-slate-400 mt-1 uppercase tracking-wider">Add a new facility or equipment to the catalogue</p>
                    </div>
                </div>
                <button onclick="closeResourceModal()" class="text-slate-400 hover:text-slate-600"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>

            <form id="resource-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                
                <!-- Image Upload Zone -->
                <div class="p-8 border-2 border-dashed border-blue-100 rounded-[32px] bg-blue-50/10 text-center relative" id="dropzone">
                    <div id="upload-prompt">
                        <div class="w-16 h-16 bg-white rounded-full shadow-lg border border-slate-50 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <h4 class="text-lg font-black text-slate-900 mb-1">Upload Resource Images</h4>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-6">Upload up to 5 high-quality images of the resource</p>
                        <button type="button" onclick="document.getElementById('image-input').click()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-black text-sm shadow-xl shadow-blue-100 mb-2">Select Images</button>
                    </div>
                    <div id="preview-grid" class="flex flex-wrap gap-4 mt-4 justify-center"></div>
                    <input type="file" id="image-input" class="hidden" multiple accept="image/*" onchange="handleImageSelect()">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Resource Name <span class="text-rose-500">*</span></label>
                        <input type="text" id="name" required placeholder="e.g., Main Auditorium" class="w-full px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Resource Type <span class="text-rose-500">*</span></label>
                        <select id="type" class="w-full px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 bg-white">
                            <option value="LECTURE_HALL">🏛️ Lecture Hall</option>
                            <option value="LAB">💻 Computer Lab</option>
                            <option value="MEETING_ROOM">🤝 Meeting Room</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Capacity <span class="text-rose-500">*</span></label>
                        <input type="number" id="capacity" required min="1" oninput="if(this.value < 1) this.value = 1" class="w-full px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 text-blue-600 font-bold">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Location <span class="text-rose-500">*</span></label>
                        <input type="text" id="location" required placeholder="e.g., Block B, Floor 2" class="w-full px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50">
                    </div>
                    <div class="col-span-2">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400">Description <span class="text-rose-500">*</span></label>
                            <span id="char-count" class="text-[10px] font-bold text-slate-450">0 letters (min 20)</span>
                        </div>
                        <textarea id="description" rows="3" oninput="updateCharCount()" placeholder="Describe the facility's features..." class="w-full px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50"></textarea>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-black text-lg shadow-2xl shadow-blue-200 hover:scale-[1.01] active:scale-95 transition-all">Create New Resource</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('jwt_token');

        if (!token) {
            window.location.href = '/index.html';
        }

        const authHeaders = {
            'Authorization': `Bearer ${token}`
        };

        let allResources = [];
        let selectedFiles = [];

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/resources`, { headers: authHeaders });
                if (res.status === 401) {
                    localStorage.removeItem('jwt_token');
                    window.location.href = '/index.html';
                    return;
                }
                const data = await res.json();
                allResources = data.data || [];
                render();
            } catch (e) { console.error('Error fetching data', e); }
        }

        function handleImageSelect() {
            const input = document.getElementById('image-input');
            const files = Array.from(input.files);
            selectedFiles = [...selectedFiles, ...files].slice(0, 5);
            updatePreviews();
        }

        function updatePreviews() {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = selectedFiles.map((file, i) => `
                <div class="relative w-24 h-24 rounded-2xl overflow-hidden shadow-md group">
                    <img src="${URL.createObjectURL(file)}" class="w-full h-full object-cover">
                    <button type="button" onclick="removeImage(${i})" class="absolute top-1 right-1 bg-white/80 rounded-full p-1 text-rose-500 opacity-0 group-hover:opacity-100 transition-all">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            `).join('');
            document.getElementById('upload-prompt').classList.toggle('hidden', selectedFiles.length > 0);
        }

        function removeImage(i) {
            selectedFiles.splice(i, 1);
            updatePreviews();
        }

        function render() {
            document.getElementById('stat-total').innerText = allResources.length;

            const query = document.getElementById('search-input').value.toLowerCase();
            const typeF = document.getElementById('type-filter').value;

            const filtered = allResources.filter(r => 
                (typeF === 'ALL' || r.type === typeF) &&
                (r.name.toLowerCase().includes(query) || r.location.toLowerCase().includes(query))
            );

            document.getElementById('resource-list').innerHTML = filtered.map(r => `
                <div class="premium-card overflow-hidden group">
                    <div class="h-40 bg-slate-100 bg-cover bg-center transition-transform group-hover:scale-105" style="background-image: url('${r.images?.[0] || 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400'}')"></div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-900 leading-tight">${r.name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${r.location}</p>
                            </div>
                            <span class="bg-blue-50 text-blue-600 text-[9px] font-black px-2 py-0.5 rounded uppercase">${r.type.replace('_', ' ')}</span>
                        </div>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-[11px] font-bold text-slate-500 uppercase">Capacity: ${r.capacity}</span>
                            <div class="flex gap-1">
                                <button onclick="editResource(${r.id})" class="p-1.5 text-slate-300 hover:text-blue-600"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                                <button onclick="deleteResource(${r.id})" class="p-1.5 text-slate-300 hover:text-rose-600"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full text-center py-20 text-slate-400 font-medium">No resources found matching your settings.</div>';
        }

        function openResourceModal() {
            document.getElementById('modal-title').innerText = "Create New Resource";
            document.getElementById('resource-form').reset();
            document.getElementById('edit-id').value = "";
            selectedFiles = [];
            updatePreviews();
            document.getElementById('resource-modal').classList.add('show');
            updateCharCount();
        }

        function closeResourceModal() { document.getElementById('resource-modal').classList.remove('show'); }

        function editResource(id) {
            const r = allResources.find(x => x.id === id);
            if (!r) return;
            document.getElementById('modal-title').innerText = "Edit Resource";
            document.getElementById('edit-id').value = r.id;
            document.getElementById('name').value = r.name;
            document.getElementById('type').value = r.type;
            document.getElementById('capacity').value = r.capacity;
            document.getElementById('location').value = r.location;
            document.getElementById('description').value = r.description;
            selectedFiles = [];
            updatePreviews();
            document.getElementById('resource-modal').classList.add('show');
            updateCharCount();
        }

        async function deleteResource(id) {
            if (!confirm("Are you sure?")) return;
            try {
                const res = await fetch(`${API_URL}/resources/${id}`, { 
                    method: 'DELETE',
                    headers: authHeaders
                });
                if (res.ok) fetchData();
            } catch (e) { alert('Delete failed'); }
        }

        function updateCharCount() {
            const text = document.getElementById('description').value.trim();
            const count = text.length;
            const display = document.getElementById('char-count');
            display.innerText = `${count} letters (min 20)`;
            display.classList.toggle('text-rose-500', count < 20);
            display.classList.toggle('text-emerald-500', count >= 20);
        }

        document.getElementById('resource-form').onsubmit = async (e) => {
            e.preventDefault();
            const desc = document.getElementById('description').value.trim();
            if (desc.length < 20) {
                alert("Description must be at least 20 letters.");
                return;
            }

            const id = document.getElementById('edit-id').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('type', document.getElementById('type').value);
            formData.append('capacity', document.getElementById('capacity').value);
            formData.append('location', document.getElementById('location').value);
            formData.append('description', document.getElementById('description').value);
            
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });

            try {
                const res = await fetch(`${API_URL}/resources${id ? '/' + id : ''}`, {
                    method: id ? 'PUT' : 'POST',
                    headers: authHeaders,
                    body: formData
                });
                if (res.ok) { closeResourceModal(); fetchData(); }
                else { 
                    const status = res.status;
                    let errorMsg = 'Unknown error';
                    try {
                        const rawText = await res.text();
                        try {
                            const errorObj = JSON.parse(rawText);
                            errorMsg = errorObj.message || errorObj.error || rawText;
                        } catch (e) {
                            errorMsg = rawText || res.statusText;
                        }
                    } catch (e) {
                        errorMsg = res.statusText;
                    }
                    console.error(`Save failed (${status}):`, errorMsg);
                    if (status === 401) {
                        alert(`Session Expired (401). Please log in again.`);
                        window.location.href = '/index.html';
                    } else {
                        alert(`Server Error ${status}: ${errorMsg}`);
                    }
                }
            } catch (err) { 
                console.error('Fetch error:', err);
                alert('Connection error. Is the server running?'); 
            }
        }

        fetchData();
    </script>
</body>
</html>
