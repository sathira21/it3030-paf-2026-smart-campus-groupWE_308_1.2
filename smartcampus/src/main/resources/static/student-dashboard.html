<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sidebar-item-active { background: #eff6ff; border-right: 4px solid #3b82f6; color: #1e40af; }
    </style>
</head>
<body class="min-h-screen flex text-slate-800">

    <!-- Sidebar -->
    <aside class="w-[280px] h-screen glass border-r border-slate-200 sticky top-0 flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 pl-2">
            <div class="w-[36px] h-[36px] bg-blue-600 rounded-[10px] flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
            </div>
            <span class="text-[20px] font-bold tracking-tight text-slate-900">Smart Campus</span>
        </div>

        <nav class="space-y-2 flex-grow">
            <a href="#" class="flex items-center gap-3 py-3 px-4 rounded-xl sidebar-item-active font-bold transition-all"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
            <a href="#" class="flex items-center gap-3 py-3 px-4 rounded-xl text-slate-500 hover:bg-slate-50 font-semibold transition-all"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Bookings</a>
            <a href="#" class="flex items-center gap-3 py-3 px-4 rounded-xl text-slate-500 hover:bg-slate-50 font-semibold transition-all"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5z"/></svg>Course Lab</a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-100 px-2 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-slate-200" id="userAvatar"></div>
            <div class="flex-grow overflow-hidden">
                <p class="text-[13px] font-bold truncate" id="userName">Loading...</p>
                <p class="text-[11px] text-slate-500 font-semibold" id="userRole">Student</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-10 max-w-[1240px]">
        <!-- Top Bar -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-[32px] font-extrabold text-[#0f172a] tracking-tight">Support Hub</h1>
                <p class="text-slate-500 font-medium">Manage your campus support tickets and alerts in one place.</p>
            </div>

            <div class="flex items-center gap-6">
                <!-- Cool Notifications Bell -->
                <div class="relative group">
                    <button class="w-11 h-11 rounded-full glass flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-all relative">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span id="notif-badge" class="hidden absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white"></span>
                    </button>
                    <!-- Dropdown -->
                    <div class="absolute right-0 top-14 w-[320px] glass rounded-2xl p-4 shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                            <span class="font-bold text-sm">Notifications</span>
                            <span class="text-[11px] text-blue-600 font-bold hover:underline cursor-pointer">Mark all as read</span>
                        </div>
                        <div id="notif-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                            <p class="text-xs text-center text-slate-400 py-4">No new alerts.</p>
                        </div>
                    </div>
                </div>

                <button id="openTicketBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-500/20 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 4v16m8-8H4"/></svg>Report Incident
                </button>
            </div>
        </header>

        <!-- Ticket Cards -->
        <div class="grid grid-cols-1 gap-6">
            <div class="glass rounded-[24px] overflow-hidden border border-slate-200">
                <div class="px-8 py-6 flex justify-between items-center border-b border-slate-100 bg-white/40">
                    <h3 class="font-bold text-lg">My Support History</h3>
                    <div class="flex gap-2 text-xs font-bold text-slate-500">
                        <span class="px-2 py-1 rounded bg-blue-50 text-blue-600">All Updates</span>
                    </div>
                </div>
                <div class="p-0 overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-xs font-bold text-slate-400 bg-slate-50 uppercase tracking-widest px-8">
                                <th class="py-4 pl-8">ID</th>
                                <th class="py-4">Issue Description</th>
                                <th class="py-4">Room</th>
                                <th class="py-4">Priority</th>
                                <th class="py-4 pr-8">Status</th>
                            </tr>
                        </thead>
                        <tbody id="ticket-table-body">
                            <!-- JS content here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="ticketModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[100] flex items-center justify-center p-6">
        <div class="glass w-full max-w-[500px] rounded-[32px] p-10 shadow-3xl animate-in zoom-in-95 duration-200">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">New Ticket</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-900"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <form id="createTicketForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Title</label>
                    <input type="text" id="t-title" required class="w-full glass bg-white/50 h-14 px-5 rounded-2xl border-slate-200 focus:border-blue-500 outline-none text-sm transition-all" placeholder="e.g. Broken AC in Lab 5">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Room ID</label>
                    <input type="text" id="t-room" required class="w-full glass bg-white/50 h-14 px-5 rounded-2xl border-slate-200 focus:border-blue-500 outline-none text-sm transition-all" placeholder="Lab 101, C204...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Priority</label>
                        <select id="t-priority" class="w-full glass bg-white/50 h-14 px-5 rounded-2xl border-slate-200 focus:border-blue-500 outline-none text-sm appearance-none transition-all">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Type</label>
                        <select class="w-full glass bg-white/50 h-14 px-5 rounded-2xl border-slate-200 focus:border-blue-500 outline-none text-sm appearance-none cursor-not-allowed">
                            <option>Maintenance</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Details</label>
                    <textarea id="t-description" rows="3" class="w-full glass bg-white/50 p-5 rounded-2xl border-slate-200 focus:border-blue-500 outline-none text-sm transition-all" placeholder="Explain the problem..."></textarea>
                </div>
                <button type="submit" class="w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-bold tracking-tight transition-all shadow-lg shadow-blue-500/20 mt-4">Submit Report</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api';
        const token = localStorage.getItem('jwt_token');

        if (!token) window.location.href = '/index.html';

        // Parse user data from JWT
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('userName').textContent = payload.sub || payload.email;
            document.getElementById('userAvatar').style.background = `hsla(${Math.random() * 360}, 70%, 80%, 1)`;
        } catch(e) {}

        // Global headers for auth
        const headers = { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };

        // Modal Controls
        const modal = document.getElementById('ticketModal');
        document.getElementById('openTicketBtn').onclick = () => modal.classList.remove('hidden');
        document.getElementById('closeModalBtn').onclick = () => modal.classList.add('hidden');

        // Fetch Tickets
        async function fetchTickets() {
            try {
                const res = await fetch(`${API_URL}/tickets/my`, { headers });
                const tickets = await res.json();
                const tbody = document.getElementById('ticket-table-body');
                
                if (tickets.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-slate-400 font-medium italic">No support history found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = tickets.map(t => `
                    <tr class="border-b border-slate-50 hover:bg-white/40 group transition-all">
                        <td class="py-5 pl-8 font-bold text-slate-400 text-xs">#${t.id}</td>
                        <td class="py-5">
                            <p class="font-bold text-sm tracking-tight">${t.title}</p>
                            <p class="text-[11px] text-slate-400 font-medium truncate max-w-[200px]">${t.description}</p>
                        </td>
                        <td class="py-5 text-xs font-bold text-slate-600">${t.roomId}</td>
                        <td class="py-5">
                            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase ${
                                t.priority === 'HIGH' ? 'bg-rose-50 text-rose-500' : 'bg-slate-100 text-slate-500'
                            }">${t.priority}</span>
                        </td>
                        <td class="py-5 pr-8">
                            <span class="flex items-center gap-1.5 font-bold text-[11px] tracking-tight ${
                                t.status === 'RESOLVED' ? 'text-emerald-500' : 'text-blue-500'
                            }">
                                <span class="w-1.5 h-1.5 rounded-full ${t.status === 'RESOLVED' ? 'bg-emerald-500' : 'bg-blue-500 animate-pulse'}"></span>
                                ${t.status}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        // Create Ticket
        document.getElementById('createTicketForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('t-title').value,
                roomId: document.getElementById('t-room').value,
                priority: document.getElementById('t-priority').value,
                description: document.getElementById('t-description').value,
                status: 'OPEN'
            };

            const res = await fetch(`${API_URL}/tickets/create`, {
                method: 'POST',
                headers,
                body: JSON.stringify(data)
            });

            if (res.ok) {
                modal.classList.add('hidden');
                document.getElementById('createTicketForm').reset();
                fetchTickets();
            }
        };

        // Notifications Poller
        async function checkNotifications() {
            try {
                // We need the numeric userId from the payload
                const payload = JSON.parse(atob(token.split('.')[1]));
                const userId = payload.userId; // Ensure your JWT includes userId!
                
                if (!userId) return;

                const res = await fetch(`${API_URL}/notifications/user/${userId}`, { headers });
                const notifs = await res.json();
                
                const list = document.getElementById('notif-list');
                const badge = document.getElementById('notif-badge');
                
                const unread = notifs.filter(n => !n.read);
                if (unread.length > 0) badge.classList.remove('hidden');
                else badge.classList.add('hidden');

                if (notifs.length > 0) {
                    list.innerHTML = notifs.map(n => `
                        <div class="p-3 rounded-xl border border-slate-100 bg-white/50 text-[11px] font-bold flex flex-col gap-1 ${!n.read ? 'bg-blue-50/50' : 'opacity-70'}">
                            <span>${n.message}</span>
                            <span class="text-[9px] text-slate-400 font-semibold uppercase tracking-wider">${new Date(n.createdAt).toLocaleString()}</span>
                        </div>
                    `).join('');
                }
            } catch(e) {}
        }

        fetchTickets();
        setInterval(fetchTickets, 30000); // Poll tickets every 30s
        setInterval(checkNotifications, 10000); // Poll notifications every 10s
        checkNotifications();
    </script>
</body>
</html>
