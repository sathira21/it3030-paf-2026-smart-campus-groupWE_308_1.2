name: Spring Boot CI/CD Pipeline
on:
  push:
    branches: [ "main", "feature/*" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - run: mvn -B clean package --file pom.xml